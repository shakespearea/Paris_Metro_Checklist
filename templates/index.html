<!DOCTYPE html>
<html lang="fr">
    <head>
        <script src="{{ url_for('static', filename='scriptManager.js') }}" defer></script>
        <link rel="stylesheet" href="static/style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Métro Checklist</title>
    </head>
    <body>
        <header class="header">
            <p>Paris - RATP</p>
            <h1>Métro Checklist</h1>
            <p>Tap on a station to mark it as visited.</p>
        </header>

        <div class="progress">
            <span class="progress-label">Total</span>
            <div class="progress-track">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <span class="progress-pct" id="pct">0%</span>
        </div>

        <ul class="grid">
            {% for line, stations in stations.items() %}
            <li class="card" data-line="{{ line }}">
            <div class="line-header" onclick="toggleLine(this)">
                <span class="line-badge">{{ line }}</span>
                <span class="line-name">Ligne {{ line }}</span>
                <span>{{ percentages[line] }}%</span>
            </div>

            <ul class="station-list">
                {% for name in stations %}
                <li class="station-item">
                    <form method="POST" style="display:contents;">
                        <input type="hidden" name="station" value="{{ name }}">
                        <button type="submit" class="station-btn {% if visited(name) %}visited{% endif %}">
                            <span>{{ name }}</span>
                        </button>
                    </form>
                </li>
                {% endfor %}
            </ul>
        </li>
        {% endfor %}
        </ul>
    </body>
</html>
